{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Already Checked In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen bg-surface-50 flex items-center justify-center p-4 font-sans">
    <div class="text-center max-w-sm">
        <div class="w-20 h-20 rounded-full bg-warning-50 flex items-center justify-center mx-auto mb-6 animate-shake">
            <svg class="w-10 h-10 text-warning-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold text-warning-600 mb-2">Already Checked In</h1>
        <p class="text-surface-600 mb-6">This guest has already been checked in.</p>

        <div class="bg-white rounded-2xl shadow-lg border border-surface-100 p-6 text-left">
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Guest</span>
                    <span class="text-sm font-semibold">{{ guest.full_name }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Event</span>
                    <span class="text-sm font-medium">{{ guest.event.name }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Seat</span>
                    <span class="text-sm font-bold text-brand-600">{{ guest.seat_number }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">First Check-in</span>
                    <span class="text-sm font-medium text-warning-600">{{ guest.checked_in_at|date:"H:i" }}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
