{% extends "base_dashboard.html" %}

{% block title %}Add Team Member{% endblock %}
{% block page_title %}Add Team Member{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6">
        <h2 class="text-xl font-bold">Add Team Member</h2>
        <p class="text-sm text-surface-500 mt-1">Invite someone to collaborate on {{ event.name }}</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">User ID or Email <span class="text-error-500">*</span></label>
                    <input type="text" name="user" required class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm" placeholder="Enter user ID">
                </div>
                <div>
                    <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Role</label>
                    <select name="role" class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
                        <option value="viewer">Viewer - Can view event details</option>
                        <option value="editor">Editor - Can edit event details</option>
                        <option value="admin">Admin - Full access</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3">
            <a href="{% url 'event_workspace' event.id %}" class="px-6 py-3 text-sm font-medium text-surface-700 dark:text-surface-300 bg-white dark:bg-surface-800 border border-surface-200 dark:border-surface-600 rounded-xl hover:bg-surface-50 dark:hover:bg-surface-700 transition-colors">Cancel</a>
            <button type="submit" class="px-6 py-3 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors">Add Member</button>
        </div>
    </form>
</div>
{% endblock %}
