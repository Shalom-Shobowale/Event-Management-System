{% extends "base_dashboard.html" %}

{% block title %}Edit Task{% endblock %}
{% block page_title %}Edit Task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
            <h2 class="font-semibold mb-4">Edit Task</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Task Title <span class="text-error-500">*</span></label>
                    <input type="text" name="title" value="{{ task.title }}" required class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Description</label>
                    <textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm resize-none">{{ task.description }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Due Date</label>
                        <input type="datetime-local" name="due_date" value="{{ task.due_date|date:'Y-m-d\TH:i' }}" class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Priority</label>
                        <select name="priority" class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
                            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
                            <option value="urgent" {% if task.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Status</label>
                    <select name="status" class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
                        <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>To Do</option>
                        <option value="progress" {% if task.status == 'progress' %}selected{% endif %}>In Progress</option>
                        <option value="done" {% if task.status == 'done' %}selected{% endif %}>Done</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between">
            <a href="{% url 'event_tasks' task.event.id %}" class="text-sm text-surface-600 hover:text-surface-900">Cancel</a>
            <div class="flex items-center gap-3">
                {% if task.status != 'done' %}
                <a href="{% url 'complete_task' task.id %}" class="px-4 py-2 text-sm font-medium text-success-600 border border-success-500 rounded-lg hover:bg-success-50 transition-colors">Mark Complete</a>
                {% endif %}
                <button type="submit" class="px-6 py-3 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors">Save Changes</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
