{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valid Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes checkmark { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-checkmark { animation: checkmark 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-surface-50 flex items-center justify-center p-4 font-sans">
    <div class="text-center max-w-sm">
        <div class="w-20 h-20 rounded-full bg-success-50 flex items-center justify-center mx-auto mb-6 animate-checkmark">
            <svg class="w-10 h-10 text-success-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold text-success-600 mb-2 animate-slide-up">Welcome!</h1>
        <p class="text-surface-600 mb-6 animate-slide-up" style="animation-delay: 0.1s">Entry validated successfully</p>

        <div class="bg-white rounded-2xl shadow-lg border border-surface-100 p-6 text-left animate-slide-up" style="animation-delay: 0.2s">
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Guest</span>
                    <span class="text-sm font-semibold">{{ guest.full_name }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Event</span>
                    <span class="text-sm font-medium">{{ guest.event.name }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Seat</span>
                    <span class="text-sm font-bold text-brand-600">{{ guest.seat_number }}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs text-surface-500 uppercase tracking-wider font-medium">Checked In</span>
                    <span class="text-sm font-medium text-success-600">Just now</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
