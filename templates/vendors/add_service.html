{% extends "base_dashboard.html" %}

{% block title %}Add Service{% endblock %}
{% block page_title %}Add New Service{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6 mb-6">
        <p class="text-surface-600 dark:text-surface-400">Add a service that you offer to event organizers.</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
            <h2 class="font-semibold mb-4">Service Details</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1.5">Service Name <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm" placeholder="e.g., Wedding Photography Package">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5">Category</label>
                    <select name="category" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm">
                        {% for value, label in categories %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5">Description</label>
                    <textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm resize-none" placeholder="Describe what this service includes..."></textarea>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
            <h2 class="font-semibold mb-4">Pricing</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1.5">Price (₦) <span class="text-red-500">*</span></label>
                    <input type="number" name="price" required min="0" step="0.01" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5">Price Unit</label>
                    <select name="price_unit" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm">
                        <option value="per event">Per Event</option>
                        <option value="per hour">Per Hour</option>
                        <option value="per day">Per Day</option>
                        <option value="per person">Per Person</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
            <h2 class="font-semibold mb-4">Duration & Capacity</h2>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1.5">Duration (hours)</label>
                    <input type="number" name="duration_hours" value="4" min="1" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5">Min Guests</label>
                    <input type="number" name="min_guests" value="0" min="0" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5">Max Guests</label>
                    <input type="number" name="max_guests" value="1000" min="1" class="w-full px-4 py-3 rounded-xl border dark:border-surface-600 bg-white dark:bg-surface-700 text-sm">
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3">
            <a href="{% url 'vendor_dashboard' %}" class="px-6 py-3 text-sm font-medium border rounded-xl hover:bg-surface-50 dark:hover:bg-surface-700 transition-colors">Cancel</a>
            <button type="submit" class="px-6 py-3 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors">Add Service</button>
        </div>
    </form>
</div>
{% endblock %}
