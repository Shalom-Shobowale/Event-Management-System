{% extends "base_dashboard.html" %}

{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 p-6">
        <h2 class="font-semibold mb-4">Change Password</h2>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-error-50 text-error-600 border border-error-200{% else %}bg-success-50 text-success-600 border border-success-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Current Password</label>
                <input type="password" name="current_password" required class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">New Password</label>
                <input type="password" name="new_password" required class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5">Confirm New Password</label>
                <input type="password" name="confirm_password" required class="w-full px-4 py-3 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none text-sm">
            </div>
            <div class="flex items-center justify-between pt-2">
                <a href="{% url 'profile' %}" class="text-sm text-surface-500 hover:text-surface-700">Cancel</a>
                <button type="submit" class="px-6 py-3 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors">Update Password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
